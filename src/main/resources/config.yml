  ##################################################################################################
  FirstJoin:
    enabled: true
    message: "&8&l[&d笶､&8&l] &d{player} joined the server for the first time!"
  Quit:
    enabled: true
    message: "&8&l[&c笳&8&l] &d{player} left the server"
  Sleep:
    single-player-sleep: true
    message: "&8&l[&e笘ｼ&8&l]&8&l &e{player} has slept the night away"
  Death:
    enabled: true
    message: "&8&l[&c笘&8&l] &c{message}"
  MobDeath:
    ENDER_DRAGON:
      message: "{player} killed the Ender Dragon!"

